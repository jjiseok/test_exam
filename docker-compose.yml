services:
  backend:
    build: ./backend
    container_name: exam-supervision-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
  frontend:
    build: ./frontend
    container_name: exam-supervision-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
